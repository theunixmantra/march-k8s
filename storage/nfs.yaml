apiVersion: v1
kind: Pod
metadata:
  name: nfs-pod
spec:
  containers:
  - name: nginx-container
    image: nginx:latest
    volumeMounts:
    - name: nfs-volume
      mountPath: /usr/share/nginx/html

  volumes:
  - name: nfs-volume
    nfs:
      server: 192.168.1.100   # 🔴 Replace with your NFS server IP
      path: /nfs-share        # 🔴 Replace with your exported directory
      readOnly: false
